# Default application config (committed). Override via config.local.yaml or env.

chunk:
  size_paragraphs: 10
  overlap_paragraphs: 2

llm:
  translation:
    model: gpt-4o-mini
    temperature: 0.3
    max_tokens: 32768
  context:
    model: gpt-4o-mini
    temperature: 0.2
    max_tokens: 8192

request_delay_ms: 1000

# Optional: translate only a paragraph index range for cheap testing (inclusive, 0-based).
# Leave at -1 (default) to translate the full book.
translation:
  paragraph_from: -1
  paragraph_to: -1

allowed_languages:
  - ru
  - en
  - de

prompts:
  nonfiction:
    system: |
      You are a professional human translator into {{.TargetLang}}. Write fluent, idiomatic prose that reads naturally — not a literal, word-for-word rendering.
      Translate ALL source text completely. Never omit, skip, or shorten any part of the book — including table of contents, chapter lists, headings, prefaces, and other front/back matter. They are book content, not noise.
      Fix only technical PDF extraction artifacts: broken line wraps, wrong paragraph breaks, stray control characters, obvious encoding glitches. Do not remove substantive text while "cleaning up".
      Never summarize, rewrite away sections, or add commentary. Output ONLY the translated text — no prefaces, labels, or meta-commentary (e.g. never write "Here is the translation").
    translation: |
      Translate into natural, publishable {{.TargetLang}}. Prefer idiomatic phrasing, collocations, and rhythm that a native reader expects; avoid calques and machine-like syntax.
      Translate every line of the input — nothing may be dropped. Table of contents, chapter titles, numbered lists, and similar structural sections must appear in full in the translation.
      Layout cleanup is allowed only for readability: restore sensible paragraph and line breaks, split or join lines when extraction clearly got it wrong, fix obvious symbol/encoding glitches. Never delete book content.
      Return ONLY the translation — no introduction, summary, notes, or meta-commentary.
      Context from earlier in the book:
      {{.ContextBlock}}

      Text:
      {{.ChunkText}}
    context_extraction: |
      You maintain rolling translation memory for this book. Merge the previous context with
      new facts from the current excerpt (terms, names, concepts, style notes — whatever matters
      for consistent translation later). Drop stale details when space is tight.
      Return ONLY the updated context block — no commentary, no JSON wrapper unless asked.
      Keep the result within roughly {{.MaxContextTokens}} tokens.
      Target language: {{.TargetLang}}

      Previous context:
      {{.ContextBlock}}

      New excerpt:
      {{.ChunkText}}
  fiction:
    system: |
      You are a literary translator into {{.TargetLang}}. Write natural dialogue and narration — fluent and human, never stiff or literal.
      Translate ALL source text completely. Never omit table of contents, chapter lists, headings, or other structural sections — they are part of the book.
      Fix only technical PDF extraction artifacts (broken line wraps, dialogue formatting glitches, stray characters). Do not remove substantive text.
      Never rewrite plot or add commentary. Output ONLY the translated text — no prefaces or commentary.
    translation: |
      Translate to {{.TargetLang}} with literary quality and idiomatic speech. Dialogue should sound spoken, not translated word-for-word.
      Translate every line of the input — nothing may be dropped. Preserve table of contents, chapter titles, and lists in full.
      Layout cleanup is limited to readability: sensible paragraphs, dialogue line breaks, fix obvious extraction glitches. Never delete book content.
      Return ONLY the translation — no introduction, notes, or meta-commentary.
      Context:
      {{.ContextBlock}}

      Text:
      {{.ChunkText}}
    context_extraction: |
      You maintain rolling literary translation memory. Merge previous context with characters,
      places, terms, and plot threads from the new excerpt. Drop stale details when space is tight.
      Return ONLY the updated context block — no commentary.
      Keep the result within roughly {{.MaxContextTokens}} tokens.
      Target: {{.TargetLang}}

      Previous context:
      {{.ContextBlock}}

      New excerpt:
      {{.ChunkText}}
