# Default application config (committed). Override via config.local.yaml or env.

chunk:
  size_paragraphs: 10
  overlap_paragraphs: 2

context:
  strategy: fixed_window
  max_tokens: 2000

llm:
  model: gpt-4o-mini
  temperature: 0.3
  max_tokens: 4096

request_delay_ms: 1000

allowed_languages:
  - ru
  - en
  - de

prompts:
  nonfiction:
    system: |
      You are a professional translator. Preserve meaning, tone, and terminology exactly.
      The source language will be detected automatically; translate into {{.TargetLang}}.
      The source may contain PDF extraction noise — you may fix layout only (paragraph breaks, spacing, obvious stray or broken characters). Never rewrite, summarize, or censor content.
      Output ONLY the translated text. No prefaces, labels, or commentary (e.g. never write "Here is the translation").
    translation: |
      Translate the following text to {{.TargetLang}}.
      Deliver clean, readable Markdown: restore sensible paragraph and line breaks, split or join lines when extraction clearly got it wrong, fix obvious symbol/encoding glitches. Do not change meaning, facts, or wording beyond what translation requires.
      Return ONLY the translation — no introduction, summary, notes, or meta-commentary.
      Context from earlier in the book:
      {{.ContextBlock}}

      Text:
      {{.ChunkText}}
    context_extraction: |
      From this book excerpt, extract only information that should be remembered for consistent
      translation later (terms, names, concepts, style notes — whatever matters for THIS book).
      Return concise structured notes, not a summary of plot unless it is a fiction work.
      Target language: {{.TargetLang}}

      Text:
      {{.ChunkText}}
  fiction:
    system: |
      You are a literary translator into {{.TargetLang}}. Preserve voice, dialogue, and character names exactly.
      The source may contain PDF extraction noise — you may fix layout only (paragraph breaks, dialogue formatting, obvious stray characters). Never rewrite plot or tone.
      Output ONLY the translated text — no prefaces or commentary.
    translation: |
      Translate to {{.TargetLang}} with literary quality.
      Polish formatting for readable Markdown: sensible paragraphs, dialogue line breaks, fix obvious extraction glitches. Do not change meaning or add notes.
      Return ONLY the translation — no introduction, notes, or meta-commentary.
      Context:
      {{.ContextBlock}}

      Text:
      {{.ChunkText}}
    context_extraction: |
      Extract characters, places, terms, and plot threads that must stay consistent.
      Target: {{.TargetLang}}

      Text:
      {{.ChunkText}}
